name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Regenerate Gradle wrapper
        run: |
          # Remove any potentially corrupt wrapper jar and regenerate with the correct version
          rm -f gradle/wrapper/gradle-wrapper.jar
          # ubuntu-latest ships with gradle; use it to regenerate the wrapper jar
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          echo "✅ Wrapper regenerated"
          ls -lh gradle/wrapper/gradle-wrapper.jar
          python3 -c "
          import zipfile
          with zipfile.ZipFile('gradle/wrapper/gradle-wrapper.jar') as z:
              keys = [n for n in z.namelist() if 'GradleWrapper' in n or 'CommandLine' in n]
              print('Key classes:', keys)
          "

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign release APK
        if: github.event_name != 'pull_request' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          apksigner sign \
            --ks release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$STORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          rm release.keystore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/app-release-signed.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release-signed.apk
            app-release-unsigned.apk
          generate_release_notes: true
