name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Regenerate Gradle wrapper
        run: |
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          echo "Wrapper JAR size: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean build (no cache)
        run: ./gradlew clean assembleDebug --stacktrace --no-build-cache --rerun-tasks

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
